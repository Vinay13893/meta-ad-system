name: Daily Brief

on:
  schedule:
    # 3:00 AM UTC = 8:30 AM IST every day
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub Actions tab (useful for testing)

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily job
        run: python -m jobs.daily_run
        env:
          SUPABASE_URL:             ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_ACCESS_TOKEN:        ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID:       ${{ secrets.META_AD_ACCOUNT_ID }}
          SHOPIFY_SHOP_DOMAIN:      ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_TOKEN:      ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          GMAIL_ADDRESS:            ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          BRIEF_RECIPIENT_EMAIL:    ${{ secrets.BRIEF_RECIPIENT_EMAIL }}
